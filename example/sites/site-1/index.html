<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Bestest Site</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">

    <style>
        html {
            overflow: hidden;
        }

        body {
            font-family: "Space Grotesk";
            background-color: #461959;
            color: #CD6688;

            font-size: 1.5rem;

            text-align: center;
        }

        .text-container {
            margin-top: auto;
            margin-bottom: auto;
            height: 98vh;

            display: grid;
            grid-template-columns: 200px 1fr 250px;
            gap: 15px
        }

        .container-item {
            margin: auto;
        }

        .center {
            text-align: center;
        }

        .button {
            text-decoration: none;
            color: #7A316F;
            background-color: #AED8CC;

            border-style: solid;
            border-width: 2px;
            border-radius: 5px;

            padding: 5px
        }
    </style>
    <script>

        async function get_api_data() {
            const API_BASE = "https://webring.homecamp.biz";
            const API_KEY = "DKmWzG5AmVy67kGmzpoO14TeaUlFJNZK" // Hard coded API_KEY for tesing. Don't try using it, It won't work.
            const MY_INDEX = 1

            const PREV_MEMBER = await fetch(`${API_BASE}/prev/index/demo-sites/${MY_INDEX}`, {
                method: "GET",
                headers: {
                    "x-api-key": `${API_KEY}`
                }
            })

            const NEXT_MEMBER = await fetch(`${API_BASE}/next/index/demo-sites/${MY_INDEX}`, {
                method: "GET",
                headers: {
                    "x-api-key": `${API_KEY}`
                }
            })

            const prev_json = await PREV_MEMBER.json()
            const next_json = await NEXT_MEMBER.json()

            return [prev_json, next_json]
        }


        async function modify_data() {
            try {
                const [prev_member, next_member] = await get_api_data();

                document.getElementById("left-button").href = prev_member.site;
                document.getElementById("right-button").href = next_member.site;

                document.getElementById("left-member-data").innerText = `${prev_member.owner}'s (index: ${prev_member.index}) site. `
                document.getElementById("right-member-data").innerText = `${next_member.owner}'s (index: ${next_member.index}) site. `
            } catch (error) {
                console.error("Failed to fetch data:", error)
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            modify_data()
        });


    </script>
</head>

<body>
    <div class="text-container">
        <div class="container-item">
            <p id="left-member-data">
                loading user data
            </p>
            <a id="left-button" class="button" href="#">
                To the left!
            </a>
        </div>
        <div class="container-item center">
            <h1>Welcome to my siteeee, it's a scary purple</h1>
            <h2>My text is a lot lighter though</h2>
            <p>Click left or right to see my friend's sites</p>
        </div>
        <div class="container-item">
            <p id="right-member-data">
                loading user data
            </p>
            <a id="right-button" class="button" href="#">
                To the Right!
            </a>
        </div>
    </div>
</body>

</html>
